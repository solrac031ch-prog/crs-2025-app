<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recuperar clave CRS HPH</title>
    <style>
      :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#10201c;background:#f3f7f6}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px}.card{width:min(520px,100%);display:grid;gap:14px;padding:22px;border:1px solid #dfe8e4;border-left:7px solid #0ea5e9;border-radius:14px;background:#fff;box-shadow:0 22px 55px rgba(15,23,42,.16)}h1{margin:0;font-size:clamp(1.6rem,5vw,2.2rem);line-height:1.05}p{margin:0;color:#52615c;line-height:1.45}label{display:grid;gap:6px;font-weight:850}input{min-height:44px;padding:9px 11px;border:1px solid #cbd5d1;border-radius:8px;font:inherit}button,a.button{min-height:44px;display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:10px;padding:10px 14px;background:#0f766e;color:#fff;font-weight:900;text-decoration:none;font:inherit;cursor:pointer}.muted{font-size:.92rem;color:#64748b}.ok,.error{padding:11px;border-radius:10px;font-weight:850;line-height:1.35}.ok{background:#f0fdf4;color:#14532d;border:1px solid #bbf7d0}.error{background:#fff1f2;color:#7f1d1d;border:1px solid #fecaca}.actions{display:grid;gap:10px}
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Recuperar clave</h1>
      <p>Escribe tu correo y enviaremos un enlace para crear una clave nueva.</p>
      <label>Correo
        <input id="email" type="email" autocomplete="email" placeholder="mdcarlosherrera@gmail.com" autofocus />
      </label>
      <div class="actions">
        <button id="send" type="button">Enviar correo de cambio de clave</button>
        <a class="button" href="./#/jefatura">Volver a Jefatura</a>
      </div>
      <div id="msg" class="muted">Revisa tambien spam o correo no deseado.</div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const url = "https://mjrcymctfnnyabvmfgda.supabase.co";
      const anonKey = "sb_publishable_sjDVmSUC3o1qtc50_xemoQ_ZZObT1y9";
      const client = window.supabase.createClient(url, anonKey, {
        auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
      });
      const email = document.querySelector("#email");
      const button = document.querySelector("#send");
      const msg = document.querySelector("#msg");
      function show(text, type) {
        msg.className = type || "muted";
        msg.textContent = text;
      }
      async function send() {
        const value = String(email.value || "").trim().toLowerCase();
        if (!value || !value.includes("@")) {
          show("Escribe el correo completo.", "error");
          return;
        }
        button.disabled = true;
        button.textContent = "Enviando...";
        show("Enviando correo...", "muted");
        try {
          const { error } = await client.auth.resetPasswordForEmail(value, {
            redirectTo: `${location.origin}${location.pathname.replace(/recuperar-clave\.html$/, "")}#/jefatura`
          });
          if (error) throw error;
          show("Listo. Enviamos el correo para cambiar la clave. Revisa spam o no deseado.", "ok");
        } catch (error) {
          show(error?.message || String(error), "error");
        } finally {
          button.disabled = false;
          button.textContent = "Enviar correo de cambio de clave";
        }
      }
      button.addEventListener("click", send);
      email.addEventListener("keydown", (event) => {
        if (event.key === "Enter") send();
      });
    </script>
  </body>
</html>
