<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050505" />
    <title>CRS HPH 2025</title>
    <link rel="manifest" href="./manifest.webmanifest" /ff>
    <link rel="stylesheet" href="./styles.css?v=12" />
  </head>
  <body>
    <header class="topbar">
      <img class="brand-logo" src="./logo-urgencia-hph.svg" alt="Urgencia Hospital Padre Hurtado" />
      <div class="brand-copy">
        <p class="eyebrow">Urgencia Adulto HPH</p>
        <h1>Derivaciones CRS 2025</h1>
      </div>
      <div class="source">Fuente: CRS 2025.pdf</div>
    </header>

    <main class="layout">
      <section class="content">
        <section class="control-panel" aria-label="Buscador y filtros">
          <label class="search">
            <span>Buscar flujo, especialidad o contacto</span>
            <input id="searchInput" type="search" placeholder="Ej: TVP, oftalmo, pulso, TACO..." autocomplete="off" />
          </label>

          <div class="shift-box">
            <span class="label">Contexto de turno</span>
            <div class="segmented" role="group" aria-label="Horario">
              <button class="segment active" data-shift="all" type="button">Todos</button>
              <button class="segment" data-shift="habil" type="button">Hábil</button>
              <button class="segment" data-shift="inhabil" type="button">Inhábil</button>
            </div>
          </div>

          <div class="notice">
            <strong>Recordatorio rápido</strong>
            <p>Toda derivación se realiza por Pitágoras. Lo que no entra en estos flujos debe ir a APS para seguir el conducto establecido.</p>
          </div>
        </section>

        <div class="quick-actions">
          <button class="chip active" data-category="Todos" type="button">Todos</button>
          <button class="chip" data-category="Flujo" type="button">Flujos</button>
          <button class="chip" data-category="Poli choque" type="button">Especialidades</button>
          <button class="chip" data-category="CRS" type="button">CRS</button>
          <button class="chip" data-category="Hospitalizados" type="button">Hospitalizados</button>
        </div>

        <div id="resultsMeta" class="results-meta"></div>
        <nav class="protocol-tabs" id="protocolNav" aria-label="Protocolos"></nav>
        <div id="cards" class="cards selected-mode" aria-live="polite"></div>
      </section>
    </main>

    <template id="cardTemplate">
      <details class="protocol-card">
        <summary class="card-toggle">
          <div class="card-head">
            <div>
              <p class="card-category"></p>
              <h2></h2>
            </div>
            <div class="card-side">
              <span class="page-badge"></span>
              <span class="chevron" aria-hidden="true">⌄</span>
            </div>
          </div>
          <p class="summary"></p>
          <div class="tags"></div>
        </summary>
        <div class="card-detail">
          <div>
            <p class="detail-label">Detalle operativo</p>
          </div>
          <div class="grid"></div>
          <div class="flow"></div>
          <div class="pathologies"></div>
          <div class="warning"></div>
        </div>
      </details>
    </template>

    <script src="./app.js?v=11"></script>
  </body>
</html>
